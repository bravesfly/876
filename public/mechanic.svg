<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background elements -->
  <g opacity="0.8">
    <circle cx="250" cy="250" r="200" fill="#FFF" opacity="0.1"/>
  </g>
  
  <!-- Mechanic figure -->
  <g transform="translate(100, 50)">
    <!-- Head -->
    <circle cx="150" cy="100" r="50" fill="#F8FAFC"/>
    <path d="M120 80 Q150 120 180 80" stroke="#334155" stroke-width="2" fill="none"/>
    <circle cx="130" cy="85" r="5" fill="#334155"/>
    <circle cx="170" cy="85" r="5" fill="#334155"/>
    <path d="M130 60 Q150 40 170 60" stroke="#334155" stroke-width="2" fill="none"/>
    
    <!-- Hair and beard -->
    <path d="M100 80 Q120 50 150 50 Q180 50 200 80" fill="#334155"/>
    <path d="M120 110 Q150 130 180 110 L180 140 Q150 160 120 140 Z" fill="#334155"/>
    
    <!-- Body/Overalls -->
    <path d="M100 150 L120 350 L180 350 L200 150 Z" fill="#1E40AF"/>
    <rect x="130" y="150" width="40" height="100" fill="#F8FAFC"/>
    <path d="M100 150 L90 180 L110 190 L100 150 Z" fill="#1E40AF"/>
    <path d="M200 150 L210 180 L190 190 L200 150 Z" fill="#1E40AF"/>
    
    <!-- Arms -->
    <path d="M90 180 L60 250 L80 260 L110 190 Z" fill="#F8FAFC"/>
    <path d="M210 180 L240 250 L220 260 L190 190 Z" fill="#F8FAFC"/>
    
    <!-- Hands -->
    <circle cx="70" cy="255" r="15" fill="#F8FAFC"/>
    <circle cx="230" cy="255" r="15" fill="#F8FAFC"/>
    
    <!-- Legs -->
    <path d="M120 350 L110 400 L140 400 L140 350 Z" fill="#1E40AF"/>
    <path d="M160 350 L160 400 L190 400 L180 350 Z" fill="#1E40AF"/>
    
    <!-- Shoes -->
    <path d="M110 400 L90 410 L140 410 L140 400 Z" fill="#334155"/>
    <path d="M160 400 L160 410 L210 410 L190 400 Z" fill="#334155"/>
    
    <!-- Overalls straps -->
    <path d="M130 150 L120 100 L130 90 L140 100 L140 150 Z" fill="#1E40AF"/>
    <path d="M170 150 L160 100 L170 90 L180 100 L170 150 Z" fill="#1E40AF"/>
    <circle cx="135" cy="100" r="5" fill="#94A3B8"/>
    <circle cx="165" cy="100" r="5" fill="#94A3B8"/>
    
    <!-- Tools -->
    <rect x="50" y="280" width="30" height="10" rx="2" fill="#94A3B8"/>
    <rect x="45" y="290" width="40" height="5" rx="1" fill="#64748B"/>
    <circle cx="240" cy="290" r="10" fill="#94A3B8"/>
    <path d="M240 280 L250 290 L240 300 L230 290 Z" fill="#64748B"/>
  </g>
  
  <!-- Tools in background -->
  <g transform="translate(350, 350)">
    <rect x="0" y="0" width="60" height="15" rx="2" fill="#94A3B8"/>
    <rect x="10" y="15" width="40" height="10" rx="2" fill="#64748B"/>
  </g>
  
  <g transform="translate(50, 380)">
    <circle cx="0" cy="0" r="15" fill="#94A3B8"/>
    <circle cx="0" cy="0" r="5" fill="#1E40AF"/>
  </g>
  
  <g transform="translate(400, 150)">
    <path d="M0 0 L20 10 L0 20 L-20 10 Z" fill="#94A3B8"/>
    <circle cx="0" cy="10" r="5" fill="#64748B"/>
  </g>
</svg>